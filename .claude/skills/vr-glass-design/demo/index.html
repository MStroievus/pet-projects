<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ART VR — The Virtual Gallery</title>
<style>
  :root {
    --bg-base: #0a0e1a;
    --bleed-red: rgba(132, 28, 52, 0.55);
    --bleed-blue: rgba(28, 58, 110, 0.50);

    --glass-1: rgba(255, 255, 255, 0.04);
    --glass-2: rgba(255, 255, 255, 0.07);
    --glass-3: rgba(255, 255, 255, 0.12);
    --glass-border: rgba(255, 255, 255, 0.10);
    --glass-border-strong: rgba(255, 255, 255, 0.25);

    --text-hi: rgba(255, 255, 255, 0.96);
    --text-mid: rgba(255, 255, 255, 0.65);
    --text-low: rgba(255, 255, 255, 0.40);

    --r-panel: 28px;
    --r-card: 18px;
    --r-chip: 12px;

    --blur: 24px;
    --shadow-float: 0 30px 80px rgba(0, 0, 0, 0.55);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    font-family: -apple-system, "SF Pro Display", Inter, "Segoe UI", sans-serif;
    background:
      radial-gradient(ellipse 80% 60% at 15% 0%, var(--bleed-red), transparent 60%),
      radial-gradient(ellipse 90% 70% at 90% 95%, var(--bleed-blue), transparent 60%),
      radial-gradient(ellipse 50% 40% at 60% 40%, rgba(60, 30, 60, 0.3), transparent 70%),
      var(--bg-base);
    color: var(--text-hi);
    display: grid;
    place-items: center;
    padding: 4vh 3vw;
  }

  .panel {
    display: grid;
    grid-template-columns: minmax(260px, 320px) 1fr;
    gap: 48px;
    width: min(1400px, 94vw);
    padding: 48px;
    background: var(--glass-1);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border: 1px solid var(--glass-border);
    border-radius: calc(var(--r-panel) + 8px);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.06), var(--shadow-float);
  }
  @media (max-width: 900px) {
    .panel { grid-template-columns: 1fr; }
  }

  .brand h1 { font-size: 24px; font-weight: 700; letter-spacing: .02em; }
  .brand p {
    margin-top: 10px;
    font-size: 12px; font-weight: 300;
    text-transform: uppercase; letter-spacing: .35em;
    color: var(--text-mid);
  }

  .nav { display: flex; flex-direction: column; gap: 28px; margin-top: 56px; }
  .nav-item {
    display: flex; align-items: center; gap: 20px;
    background: none; border: 0; padding: 0;
    color: var(--text-hi); font: inherit; text-align: left; cursor: pointer;
  }
  .nav-chip {
    display: grid; place-items: center;
    width: 52px; height: 52px;
    font-size: 13px; color: var(--text-mid);
    background: var(--glass-2);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border: 1px solid var(--glass-border);
    border-radius: var(--r-chip);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    transition: background .25s, border-color .25s;
  }
  .nav-item:hover .nav-chip { background: var(--glass-3); }
  .nav-name { font-size: 18px; }

  .nav-item.active {
    padding: 14px 18px;
    background: var(--glass-3);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border: 1px solid var(--glass-border-strong);
    border-radius: var(--r-card);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 8px 32px rgba(0,0,0,.3);
  }
  .nav-thumb {
    width: 64px; height: 64px; flex-shrink: 0;
    border-radius: var(--r-chip);
    border: 1px solid var(--glass-border);
  }
  .nav-meta { display: flex; flex-direction: column; gap: 3px; }
  .nav-meta .m1 { font-size: 13px; color: var(--text-mid); }
  .nav-meta .m2 { font-size: 13px; color: var(--text-low); }

  .hero-media {
    aspect-ratio: 16 / 10;
    border-radius: var(--r-panel);
    border: 1px solid var(--glass-border);
    box-shadow: 0 24px 60px rgba(0,0,0,.45);
    background:
      radial-gradient(ellipse 60% 50% at 75% 20%, rgba(158, 52, 80, .9), transparent 60%),
      radial-gradient(ellipse 70% 60% at 20% 30%, rgba(190, 120, 140, .5), transparent 60%),
      radial-gradient(ellipse 80% 70% at 70% 85%, rgba(51, 87, 107, .9), transparent 70%),
      linear-gradient(160deg, #6e2438 0%, #3a2340 35%, #2c4f60 70%, #122832 100%);
  }
  .hero figcaption { text-align: center; margin-top: 28px; }
  .hero h2 { font-size: 28px; font-weight: 700; }
  .hero figcaption p { margin-top: 8px; font-size: 15px; color: var(--text-mid); }
  .hero .dot { margin: 0 .6em; color: var(--text-low); }

  .carousel {
    display: flex; align-items: center; gap: 14px;
    width: max-content; margin: 32px auto 0;
    padding: 14px 18px;
    background: var(--glass-2);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border: 1px solid var(--glass-border);
    border-radius: 22px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 8px 32px rgba(0,0,0,.25);
  }
  .thumb {
    width: 64px; height: 64px;
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    cursor: pointer; padding: 0;
    transition: transform .25s, border-color .25s;
  }
  .thumb:hover { transform: translateY(-2px); }
  .thumb.active {
    border: 2px solid var(--glass-border-strong);
    box-shadow: 0 0 0 1px rgba(255,255,255,.15), 0 8px 24px rgba(0,0,0,.35);
    transform: scale(1.06);
  }
  .divider { width: 1px; height: 40px; background: var(--glass-border); margin: 0 6px; }
  .chevron {
    width: 56px; height: 56px;
    display: grid; place-items: center;
    font-size: 22px; color: var(--text-hi);
    background: none; border: 0; border-radius: var(--r-chip);
    cursor: pointer; transition: background .25s;
  }
  .chevron:hover { background: var(--glass-2); }

  :focus-visible {
    outline: 1px solid var(--glass-border-strong);
    outline-offset: 3px;
  }
</style>
</head>
<body>
  <main class="panel">
    <aside class="sidebar">
      <header class="brand">
        <h1>ART VR</h1>
        <p>The Virtual Gallery</p>
      </header>
      <nav class="nav">
        <button class="nav-item">
          <span class="nav-chip">1</span>
          <span class="nav-name">Elena Rostova</span>
        </button>
        <button class="nav-item">
          <span class="nav-chip">2</span>
          <span class="nav-name">Marcus Vance</span>
        </button>
        <button class="nav-item">
          <span class="nav-chip">3</span>
          <span class="nav-name">Sophia Lin</span>
        </button>
        <button class="nav-item active">
          <span class="nav-thumb" style="background:linear-gradient(135deg,#8e2f44 0%,#3b2a4d 45%,#2c5364 100%)"></span>
          <span class="nav-meta">
            <span class="nav-name">Julian Cross</span>
            <span class="m1">Contemporary</span>
            <span class="m2">Mixed Media</span>
          </span>
        </button>
      </nav>
    </aside>

    <section class="content">
      <figure class="hero">
        <div class="hero-media"></div>
        <figcaption>
          <h2>Vibrant Grove</h2>
          <p><span>2024</span><span class="dot">·</span><span>Contemporary</span></p>
        </figcaption>
      </figure>

      <div class="carousel">
        <button class="thumb" style="background:linear-gradient(135deg,#c98a3d,#7b4fa0)" aria-label="Artwork 1"></button>
        <button class="thumb" style="background:linear-gradient(135deg,#bcd8d2,#2e6e72)" aria-label="Artwork 2"></button>
        <button class="thumb" style="background:linear-gradient(135deg,#2e4ed7,#d7572e)" aria-label="Artwork 3"></button>
        <button class="thumb active" style="background:linear-gradient(135deg,#9e3450,#33576b)" aria-label="Artwork 4 (current)"></button>
        <span class="divider"></span>
        <button class="chevron" aria-label="Next">›</button>
      </div>
    </section>
  </main>
</body>
</html>
